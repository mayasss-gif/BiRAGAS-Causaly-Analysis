<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BiRAGAS · Causaly Competitive Analysis</title>
<meta name="description" content="BiRAGAS Revenue Streams Master Presentation — 62 slides · five streams · one causal operating system · $618.8M by 2030.">

<style>
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    background: #0A0908;
    color: #F5F0E8;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overscroll-behavior-y: contain;
  }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: #0A0908; }
  ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #333; }

  #boot {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0A0908; color: #F5F0E8; z-index: 0;
  }
  #boot .kicker { font-size: 10px; letter-spacing: 0.3em; color: #888; font-family: monospace; }
  #boot .logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; margin-top: 14px; text-align: center; max-width: 92vw; color: #F5F0E8; }
  #boot .spin { margin-top: 30px; width: 22px; height: 22px; border: 2px solid #333; border-top-color: #C8A560; border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Top bar */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: 56px;
    background: rgba(10, 9, 8, 0.9);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid #1F1F1F;
    display: flex; align-items: center;
    padding: 0 24px; gap: 14px;
    z-index: 100;
    padding-top: env(safe-area-inset-top, 0px);
    height: calc(56px + env(safe-area-inset-top, 0px));
  }
  .hamburger { background: transparent; border: 1px solid #333; width: 40px; height: 40px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; flex-shrink: 0; }
  .hamburger:active { background: #1A1A1A; }
  .tb-title { font-size: 13px; font-weight: 700; letter-spacing: -0.2px; color: #F5F0E8; min-width: 0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tb-kicker { font-size: 9px; color: #888; font-family: monospace; letter-spacing: 0.2em; }
  .chip { display: inline-flex; align-items: center; padding: 5px 10px; background: #161616; border: 1px solid #2A2A2A; font-family: monospace; font-size: 10px; color: #C8C4BC; border-radius: 3px; letter-spacing: 0.06em; flex-shrink: 0; }
  .audio-btn { background: transparent; color: #C8C4BC; border: 1px solid #333; padding: 7px 12px; font-family: monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.06em; cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .audio-btn.on { background: var(--accent, #C8A560); color: #0A0908; border-color: var(--accent, #C8A560); }

  /* Drawer */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.22s ease; }
  .drawer-overlay.open { opacity: 1; pointer-events: auto; }
  .drawer { position: fixed; top: 0; left: 0; bottom: 0; width: min(86vw, 380px); background: #0F0F0F; z-index: 310; transform: translateX(-100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); display: flex; flex-direction: column; box-shadow: 0 0 60px rgba(0,0,0,0.8); }
  .drawer.open { transform: translateX(0); }
  .drawer-head { padding: 16px 20px; border-bottom: 1px solid #1F1F1F; display: flex; justify-content: space-between; align-items: center; padding-top: max(16px, env(safe-area-inset-top, 16px)); }
  .drawer-list { flex: 1; overflow-y: auto; padding: 6px 0; padding-bottom: max(20px, env(safe-area-inset-bottom, 20px)); }
  .drawer-item { display: block; width: 100%; background: transparent; border: none; border-left: 3px solid transparent; padding: 12px 18px; text-align: left; cursor: pointer; font-family: inherit; transition: background 0.12s ease; }
  .drawer-item:active { background: #1A1A1A; }
  .drawer-stream-header { padding: 14px 18px 6px; font-size: 9px; letter-spacing: 0.3em; font-family: monospace; font-weight: 700; }

  /* Slide container */
  .slide {
    min-height: 100vh;
    min-height: 100dvh;
    padding: calc(80px + env(safe-area-inset-top, 0px)) 80px 140px;
    box-sizing: border-box;
    display: flex; flex-direction: column;
  }
  .slide-kicker { font-size: 10px; letter-spacing: 0.3em; color: var(--accent, #C8A560); font-family: monospace; font-weight: 700; margin-bottom: 14px; text-transform: uppercase; }
  .slide-title { font-size: 38px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin: 0 0 14px; color: #F5F0E8; }
  .slide-subtitle { font-size: 18px; color: #C8C4BC; line-height: 1.45; font-style: italic; margin-bottom: 24px; max-width: 920px; }
  .slide-body { font-size: 15px; line-height: 1.65; color: #C8C4BC; max-width: 880px; margin-bottom: 24px; white-space: pre-wrap; }

  /* Cover kind */
  .slide.cover { justify-content: center; }
  .slide.cover .slide-title { font-size: 64px; line-height: 1.05; margin-bottom: 18px; }
  .slide.cover .slide-subtitle { font-size: 20px; max-width: 980px; }
  .big-number { font-size: 96px; font-weight: 800; letter-spacing: -2px; color: var(--accent, #C8A560); margin: 30px 0 8px; line-height: 1; }
  .big-label { font-size: 13px; font-family: monospace; color: #888; letter-spacing: 0.06em; max-width: 880px; line-height: 1.5; }

  /* Manifesto kind */
  .slide.manifesto { justify-content: center; }
  .slide.manifesto .slide-title { font-size: 56px; line-height: 1.1; max-width: 1100px; }
  .slide.manifesto .slide-subtitle { font-size: 22px; max-width: 980px; color: #E8E4DC; line-height: 1.5; }

  /* KPI grid */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 22px 0; max-width: 1200px; }
  .kpi { background: #0F0F0F; border: 1px solid #1F1F1F; border-top: 3px solid var(--accent, #C8A560); padding: 22px 18px; }
  .kpi-k { font-size: 30px; font-weight: 700; color: #F5F0E8; letter-spacing: -0.6px; line-height: 1.1; }
  .kpi-v { font-size: 11px; color: #888; margin-top: 8px; font-family: monospace; text-transform: uppercase; letter-spacing: 0.06em; line-height: 1.4; }

  /* Tables */
  .tbl-wrap { margin: 22px 0; border: 1px solid #1F1F1F; background: #0F0F0F; max-width: 1300px; }
  .tbl-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tbl { border-collapse: collapse; width: 100%; min-width: 100%; }
  .tbl th { background: #161616; padding: 14px 16px; text-align: left; font-size: 10px; letter-spacing: 0.18em; color: #888; text-transform: uppercase; font-family: monospace; font-weight: 700; border-bottom: 2px solid var(--accent, #C8A560); white-space: nowrap; }
  .tbl td { padding: 12px 16px; font-size: 13px; color: #E8E4DC; border-bottom: 1px solid #1A1A1A; vertical-align: top; line-height: 1.45; }
  .tbl td:first-child { color: var(--accent, #C8A560); font-weight: 700; white-space: nowrap; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl .total-row td { background: #161616; font-weight: 700; border-top: 2px solid var(--accent, #C8A560); }

  /* Chart */
  .chart-card { background: #0F0F0F; border: 1px solid #1F1F1F; padding: 26px; margin: 22px 0; max-width: 1100px; }
  .chart-title { font-size: 11px; letter-spacing: 0.22em; color: #888; text-transform: uppercase; font-family: monospace; margin-bottom: 16px; font-weight: 700; }
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 14px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #C8C4BC; font-family: monospace; }
  .legend-dot { width: 14px; height: 14px; display: inline-block; border-radius: 2px; flex-shrink: 0; }

  /* Bullet list */
  .bullet-list { list-style: none; padding: 0; margin: 22px 0; max-width: 1100px; }
  .bullet-list li { padding: 14px 0 14px 36px; position: relative; font-size: 15px; line-height: 1.55; color: #E8E4DC; border-bottom: 1px solid #1A1A1A; }
  .bullet-list li:last-child { border-bottom: none; }
  .bullet-list li::before { content: "→"; position: absolute; left: 8px; top: 14px; color: var(--accent, #C8A560); font-weight: 700; font-size: 18px; }

  /* Pill nav */
  .pill-nav {
    position: fixed; left: 14px; right: 14px;
    bottom: max(20px, calc(env(safe-area-inset-bottom, 0px) + 14px));
    display: flex; gap: 10px;
    z-index: 200;
    pointer-events: none;
  }
  .pill-nav button {
    pointer-events: auto; flex: 1;
    height: 58px; border-radius: 29px;
    border: 1px solid #2A2A2A;
    background: rgba(15,15,15,0.96);
    color: #F5F0E8;
    font-family: monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 16px 44px rgba(0,0,0,0.6);
    transition: transform 0.12s ease;
  }
  .pill-nav button:active { transform: scale(0.97); }
  .pill-nav button.next { background: var(--accent, #C8A560); color: #0A0908; border-color: var(--accent, #C8A560); }
  .pill-nav button:disabled { opacity: 0.35; cursor: default; }

  @media (min-width: 901px) {
    .pill-nav { left: auto; right: 32px; width: 320px; }
  }

  /* Mobile */
  @media (max-width: 900px) {
    .topbar { padding: 0 14px; gap: 10px; }
    .tb-title { font-size: 12px; }
    .tb-kicker { display: none; }
    .slide { padding: calc(72px + env(safe-area-inset-top, 0px)) 18px 180px; }
    .slide-title { font-size: 24px; }
    .slide-subtitle { font-size: 14px; }
    .slide-body { font-size: 14px; }
    .slide.cover .slide-title { font-size: 36px; }
    .slide.cover .slide-subtitle { font-size: 15px; }
    .big-number { font-size: 56px; }
    .slide.manifesto .slide-title { font-size: 30px; line-height: 1.15; }
    .slide.manifesto .slide-subtitle { font-size: 15px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .kpi { padding: 14px 10px; }
    .kpi-k { font-size: 20px; }
    .kpi-v { font-size: 9px; margin-top: 5px; }
    .chart-card { padding: 14px 12px; margin: 16px 0; }
    .chart-title { font-size: 10px; margin-bottom: 10px; }
    .legend-item { font-size: 10px; }
    .tbl th { padding: 8px 10px; font-size: 9px; }
    .tbl td { padding: 8px 10px; font-size: 11.5px; }
    .bullet-list li { font-size: 13px; padding: 11px 0 11px 30px; }
    .audio-btn { padding: 6px 10px; font-size: 9px; }
    .audio-btn span:last-child { display: none; }
  }
</style>
</head>
<body>

<div id="boot">
  <div class="kicker">BIRAGAS · MMXXVI</div>
  <div class="logo">CAUSALY · COMPETITIVE ANALYSIS</div>
  <div class="spin"></div>
</div>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const DATA = window.__DECK_DATA__;
const slides = DATA.slides;

const STREAM_NAMES = {
  intro:    "Intro",
  causaly:  "Causaly",
  thesis:   "The Causal Distinction",
  platform: "Platform Stack",
  compare:  "Head-to-Head",
  threat:   "Threat & Watch-List",
  close:    "Posture & Close",
};
const STREAM_COLORS = {
  intro: "#C8A560", causaly: "#0EA5E9", thesis: "#DC2626",
  platform: "#3B82F6", compare: "#10B981", threat: "#EF4444", close: "#1E40AF",
};

// ─── CHART COMPONENTS ───
function BarH({ data, title, unit }) {
  const max = Math.max(...data.map(d => d.value)) * 1.05;
  const W = 760, H = 38 * data.length + 30, leftPad = 230;
  return (
    <div className="chart-card">
      {title && <div className="chart-title">{title}</div>}
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ width: "100%", height: "auto", display: "block" }}>
        {data.map((d, i) => {
          const y = i * 38 + 12;
          const barW = Math.max(2, (d.value / max) * (W - leftPad - 30));
          const val = typeof d.value === "number" ? (d.value < 10 ? +d.value.toFixed(2) : d.value.toLocaleString()) : d.value;
          return (
            <g key={i}>
              <text x={leftPad - 14} y={y + 19} textAnchor="end" fill="#C8C4BC" fontSize="12" fontWeight="500">{d.label}</text>
              <rect x={leftPad} y={y + 4} width={barW} height={24} fill={d.color || "#3B82F6"} rx="2" />
              <text x={leftPad + barW + 8} y={y + 21} fill="#F5F0E8" fontSize="12" fontFamily="monospace" fontWeight="700">{val}{unit ? unit : ""}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function BarV({ data, title, unit }) {
  const max = Math.max(...data.map(d => d.value)) * 1.15;
  const W = 720, H = 320, padBottom = 50, padTop = 30, padX = 40;
  const barW = (W - padX * 2) / data.length;
  return (
    <div className="chart-card">
      {title && <div className="chart-title">{title}</div>}
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ width: "100%", height: "auto", display: "block" }}>
        {data.map((d, i) => {
          const h = ((d.value / max) * (H - padTop - padBottom));
          const x = padX + i * barW + barW * 0.15;
          const w = barW * 0.7;
          const y = H - padBottom - h;
          return (
            <g key={i}>
              <rect x={x} y={y} width={w} height={h} fill={d.color || "#3B82F6"} rx="2" />
              <text x={x + w / 2} y={y - 8} textAnchor="middle" fill="#F5F0E8" fontSize="12" fontFamily="monospace" fontWeight="700">{d.value}{unit ? unit : ""}</text>
              <text x={x + w / 2} y={H - padBottom + 20} textAnchor="middle" fill="#C8C4BC" fontSize="11" fontFamily="-apple-system,sans-serif" fontWeight="600">{d.label}</text>
            </g>
          );
        })}
        <line x1={padX} y1={H - padBottom} x2={W - padX} y2={H - padBottom} stroke="#333" strokeWidth="1" />
      </svg>
    </div>
  );
}

function BarVGrouped({ x, series, title }) {
  const all = series.flatMap(s => s.data);
  const max = Math.max(...all) * 1.18;
  const W = 760, H = 360, padBottom = 60, padTop = 20, padX = 40;
  const groupW = (W - padX * 2) / x.length;
  const barW = groupW * 0.85 / series.length;
  return (
    <div className="chart-card">
      {title && <div className="chart-title">{title}</div>}
      <div className="legend">
        {series.map((s, i) => <div key={i} className="legend-item"><span className="legend-dot" style={{ background: s.color }}></span>{s.label}</div>)}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ width: "100%", height: "auto", display: "block" }}>
        {x.map((xLabel, gi) => {
          const gx = padX + gi * groupW + groupW * 0.075;
          return (
            <g key={gi}>
              {series.map((s, si) => {
                const v = s.data[gi] || 0;
                const h = (v / max) * (H - padTop - padBottom);
                const bx = gx + si * barW;
                const by = H - padBottom - h;
                return <rect key={si} x={bx} y={by} width={barW - 2} height={h} fill={s.color} rx="1" />;
              })}
              <text x={gx + groupW * 0.42} y={H - padBottom + 22} textAnchor="middle" fill="#C8C4BC" fontSize="11" fontFamily="monospace" fontWeight="600">{xLabel}</text>
            </g>
          );
        })}
        <line x1={padX} y1={H - padBottom} x2={W - padX} y2={H - padBottom} stroke="#333" strokeWidth="1" />
      </svg>
    </div>
  );
}

function LineChart({ x, series, title }) {
  const all = series.flatMap(s => s.data);
  const max = Math.max(...all) * 1.15;
  const W = 760, H = 360, padBottom = 50, padTop = 30, padX = 50;
  const innerW = W - padX * 2, innerH = H - padTop - padBottom;
  const stepX = innerW / Math.max(1, x.length - 1);
  return (
    <div className="chart-card">
      {title && <div className="chart-title">{title}</div>}
      <div className="legend">
        {series.map((s, i) => <div key={i} className="legend-item"><span className="legend-dot" style={{ background: s.color, width: 18, height: 3, borderRadius: 1 }}></span>{s.label}</div>)}
      </div>
      <svg viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMinYMin meet" style={{ width: "100%", height: "auto", display: "block" }}>
        {[0, 0.25, 0.5, 0.75, 1].map((t, i) => {
          const y = padTop + innerH * t;
          return (
            <g key={i}>
              <line x1={padX} y1={y} x2={W - padX} y2={y} stroke="#1F1F1F" strokeWidth="1" />
              <text x={padX - 8} y={y + 4} textAnchor="end" fill="#666" fontSize="10" fontFamily="monospace">{Math.round(max * (1 - t))}</text>
            </g>
          );
        })}
        {x.map((xLabel, i) => (
          <text key={i} x={padX + i * stepX} y={H - padBottom + 20} textAnchor="middle" fill="#C8C4BC" fontSize="11" fontFamily="monospace" fontWeight="600">{xLabel}</text>
        ))}
        {series.map((s, si) => {
          const points = s.data.map((v, i) => [padX + i * stepX, padTop + innerH * (1 - v / max)]);
          const path = points.map((p, i) => `${i === 0 ? "M" : "L"} ${p[0]} ${p[1]}`).join(" ");
          const last = points[points.length - 1];
          return (
            <g key={si}>
              <path d={path} stroke={s.color} strokeWidth="2.5" fill="none" />
              {points.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="4" fill={s.color} stroke="#0A0908" strokeWidth="2" />)}
              <text x={last[0] + 8} y={last[1] + 4} fill={s.color} fontSize="11" fontFamily="monospace" fontWeight="700">{s.data[s.data.length - 1]}</text>
            </g>
          );
        })}
      </svg>
    </div>
  );
}

function renderChart(chart) {
  if (!chart) return null;
  if (chart.type === "bar-h") return <BarH data={chart.data} title={chart.title} unit={chart.unit} />;
  if (chart.type === "bar-v") return <BarV data={chart.data} title={chart.title} unit={chart.unit} />;
  if (chart.type === "bar-v-grouped") return <BarVGrouped x={chart.x} series={chart.series} title={chart.title} />;
  if (chart.type === "line") return <LineChart x={chart.x} series={chart.series} title={chart.title} />;
  return null;
}

// ─── APP ───
function App() {
  const [idx, setIdx] = useState(0);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [audioOn, setAudioOn] = useState(false);
  const touchRef = useRef(null);
  const audioRef = useRef(null);
  const slideRef = useRef(null);

  const cur = slides[idx];
  const accent = cur.color;

  useEffect(() => { document.body.style.overflow = drawerOpen ? "hidden" : ""; return () => { document.body.style.overflow = ""; }; }, [drawerOpen]);
  useEffect(() => { const b = document.getElementById("boot"); if (b) b.style.display = "none"; }, []);
  useEffect(() => { if (slideRef.current) slideRef.current.scrollTop = 0; window.scrollTo(0, 0); }, [idx]);

  // Audio sync
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    a.pause();
    if (!audioOn) return;
    a.src = `audio/${cur.id}.mp3`;
    a.load();
    const p = a.play();
    if (p) p.catch(() => {});
  }, [idx, audioOn]);

  // Keyboard
  useEffect(() => {
    const h = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
      if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { e.preventDefault(); setIdx(i => Math.min(slides.length - 1, i + 1)); }
      else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); setIdx(i => Math.max(0, i - 1)); }
      else if (e.key.toLowerCase() === "m") setAudioOn(v => !v);
      else if (e.key.toLowerCase() === "n") setDrawerOpen(v => !v);
      else if (e.key === "Escape") setDrawerOpen(false);
      else if (e.key === "Home") setIdx(0);
      else if (e.key === "End") setIdx(slides.length - 1);
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);

  const onTouchStart = (e) => { touchRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() }; };
  const onTouchEnd = (e) => {
    const s = touchRef.current; if (!s) return;
    const dx = e.changedTouches[0].clientX - s.x;
    const dy = e.changedTouches[0].clientY - s.y;
    const dt = Date.now() - s.t;
    touchRef.current = null;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4 && dt < 700) {
      if (dx < 0) setIdx(i => Math.min(slides.length - 1, i + 1));
      else setIdx(i => Math.max(0, i - 1));
    }
  };

  // Group slides by stream for drawer
  const groups = [];
  let lastStream = null;
  slides.forEach((s, i) => {
    if (s.stream !== lastStream) {
      groups.push({ stream: s.stream, name: STREAM_NAMES[s.stream], color: STREAM_COLORS[s.stream], slides: [] });
      lastStream = s.stream;
    }
    groups[groups.length - 1].slides.push({ idx: i, slide: s });
  });

  // Render slide content
  const renderSlide = () => {
    return (
      <div className={`slide ${cur.kind}`} ref={slideRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} style={{ touchAction: "pan-y" }}>
        {cur.kicker && <div className="slide-kicker">{cur.kicker}</div>}
        {cur.title && <h1 className="slide-title">{cur.title}</h1>}
        {cur.subtitle && <div className="slide-subtitle">{cur.subtitle}</div>}
        {cur.body && <div className="slide-body">{cur.body}</div>}

        {cur.kind === "cover" && cur.big_number && (
          <div>
            <div className="big-number">{cur.big_number}</div>
            {cur.big_label && <div className="big-label">{cur.big_label}</div>}
          </div>
        )}

        {cur.kpis && cur.kpis.length > 0 && (
          <div className="kpi-grid">
            {cur.kpis.map((k, i) => (
              <div key={i} className="kpi">
                <div className="kpi-k">{k.k}</div>
                <div className="kpi-v">{k.v}</div>
              </div>
            ))}
          </div>
        )}

        {cur.chart && renderChart(cur.chart)}

        {cur.table && (
          <div className="tbl-wrap">
            <div className="tbl-scroll">
              <table className="tbl">
                {cur.table.title && (
                  <caption style={{ fontSize: 11, letterSpacing: "0.2em", color: "#888", textTransform: "uppercase", fontFamily: "monospace", padding: "12px 16px", textAlign: "left", fontWeight: 700 }}>
                    {cur.table.title}
                  </caption>
                )}
                <thead>
                  <tr>{cur.table.headers.map((h, i) => <th key={i}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {cur.table.rows.map((row, ri) => {
                    const isTotal = String(row[0]).toUpperCase().includes("TOTAL");
                    return (
                      <tr key={ri} className={isTotal ? "total-row" : ""}>
                        {row.map((cell, ci) => (
                          <td key={ci}>{typeof cell === "number" ? cell.toLocaleString() : cell}</td>
                        ))}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {cur.bullets && cur.bullets.length > 0 && (
          <ul className="bullet-list">
            {cur.bullets.map((b, i) => <li key={i}>{b}</li>)}
          </ul>
        )}
      </div>
    );
  };

  return (
    <div style={{ "--accent": accent, minHeight: "100vh", background: "#0A0908" }}>
      {/* TOP BAR */}
      <div className="topbar">
        <button className="hamburger" onClick={() => setDrawerOpen(true)} aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2" y="4" width="16" height="2" fill="#F5F0E8" rx="1"/>
            <rect x="2" y="9" width="16" height="2" fill="#F5F0E8" rx="1"/>
            <rect x="2" y="14" width="16" height="2" fill="#F5F0E8" rx="1"/>
          </svg>
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="tb-kicker">{STREAM_NAMES[cur.stream]} · {DATA.title}</div>
          <div className="tb-title">{cur.title || cur.kicker}</div>
        </div>
        <button className={`audio-btn ${audioOn ? "on" : ""}`} onClick={() => setAudioOn(v => !v)} aria-label={audioOn ? "Mute" : "Play"}>
          <span style={{ fontSize: 14 }}>{audioOn ? "🔊" : "🔇"}</span>
          <span>{audioOn ? "ON" : "OFF"}</span>
        </button>
        <span className="chip">{String(idx + 1).padStart(2, "0")} / {String(slides.length).padStart(2, "0")}</span>
      </div>

      {/* DRAWER */}
      <div className={`drawer-overlay ${drawerOpen ? "open" : ""}`} onClick={() => setDrawerOpen(false)} />
      <div className={`drawer ${drawerOpen ? "open" : ""}`}>
        <div className="drawer-head">
          <div>
            <div style={{ fontSize: 9, letterSpacing: "0.25em", color: "#888", textTransform: "uppercase", fontFamily: "monospace", marginBottom: 4 }}>NAVIGATION</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: "#F5F0E8" }}>{slides.length} slides</div>
          </div>
          <button onClick={() => setDrawerOpen(false)} aria-label="Close" style={{ background: "transparent", border: "1px solid #333", color: "#F5F0E8", width: 36, height: 36, borderRadius: 4, cursor: "pointer", fontSize: 22, lineHeight: 1, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
        </div>
        <div className="drawer-list">
          {groups.map((g, gi) => (
            <div key={gi}>
              <div className="drawer-stream-header" style={{ color: g.color }}>
                {g.name.toUpperCase()}
              </div>
              {g.slides.map(({ idx: si, slide }) => {
                const active = si === idx;
                return (
                  <button key={si} className="drawer-item" onClick={() => { setIdx(si); setDrawerOpen(false); }} style={{ background: active ? "#1A1A1A" : "transparent", borderLeftColor: active ? slide.color : "transparent" }}>
                    <div style={{ fontSize: 9, fontFamily: "monospace", color: active ? slide.color : "#666", letterSpacing: "0.1em", marginBottom: 3, fontWeight: 700 }}>
                      {String(si + 1).padStart(2, "0")} · {slide.kind.toUpperCase()}
                    </div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: active ? "#F5F0E8" : "#C8C4BC", letterSpacing: "-0.2px", lineHeight: 1.3 }}>{slide.title || slide.kicker}</div>
                  </button>
                );
              })}
            </div>
          ))}
        </div>
      </div>

      {renderSlide()}

      <audio ref={audioRef} preload="auto" />

      {/* PILL NAV */}
      <div className="pill-nav">
        <button onClick={() => setIdx(i => Math.max(0, i - 1))} disabled={idx === 0}>← Prev</button>
        <button className="next" onClick={() => setIdx(i => Math.min(slides.length - 1, i + 1))} disabled={idx === slides.length - 1}>Next →</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
